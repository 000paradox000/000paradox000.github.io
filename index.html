<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A dependency-free dark world clock dashboard showing current date and time across selected cities.">
    <link
        rel="icon"
        type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%230d1117' stroke='%2358a6ff' stroke-width='6'/%3E%3Cpath d='M50 25v28l18 10' stroke='%2358a6ff' stroke-width='6' stroke-linecap='round' fill='none'/%3E%3C/svg%3E">
    <title>World City Times</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <main class="app-shell">
        <section class="panel">
            <div id="cityClockGrid" class="clock-grid"></div>
        </section>
    </main>

    <noscript>
        <p class="noscript-message">Please enable JavaScript to see live city times.</p>
    </noscript>
</body>
</html>
