<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A dependency-free dark world clock dashboard showing current date and time across selected cities.">
    <meta name="theme-color" content="#0d1117">
    <title>World City Times</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <main class="app-shell">
        <section class="panel" aria-labelledby="clock-title">
            <div class="panel-header">
                <div>
                    <h2 id="clock-title">Current local times</h2>
                    <p id="lastUpdated" class="last-updated" aria-live="polite">Updating…</p>
                </div>
            </div>

            <div id="cityClockGrid" class="clock-grid" aria-describedby="lastUpdated"></div>
        </section>
    </main>

    <noscript>
        <p class="noscript-message">Please enable JavaScript to see live city times.</p>
    </noscript>
</body>
</html>
